<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            font-family: 'Courier Prime', monospace;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
        }
        header a {
            margin-left: 2rem;
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
        }
        header a i {
            font-size: 1.5rem; 
        }
        header a:hover {
            color: #3498db;
        }

        .social-links {
            display: flex;
            justify-content: flex-end;
            position: absolute;
            top: 1rem;
            right: 2rem;
        }
        .social-links a {
            margin-left: 1.5rem;
            color: #333;
            font-size: 1.5rem;
        }
        .social-links a:hover {
            color: #3498db;
        }

        main {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
            margin-top: 5rem; /* Added margin to avoid overlap with header */
        }
        .about-me {
            max-width: 300px;
            font-size: 1rem;
            line-height: 1.6;
            text-align: justify;
        }
        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-left: 6rem; /* Increased margin */
        }
        footer {
            text-align: center;
            padding: 0.3rem 0;
            width: 100%;
            background-color: #fff;
            font-size: 0.8rem;
            position: absolute;
            bottom: 0;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            header a {
                margin: 0.5rem 0;
            }
            main {
                padding-left: 1rem;
            }
        }
        @media (min-width: 769px) {
            main {
                padding-left: 3rem;
            }
        }
    
    </style>
</head>
<body>
    <header>
        <a href="projects.html">Projects</a>
        <a href="designs.html">Designs</a>
        <a href="other.html">Other</a>
    </header>
    
    <div class="social-links">
        <a href="https://www.linkedin.com/in/alexandros-kalergis/" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/alexkalergis" target="_blank" aria-label="GitHub">
            <i class="fab fa-github"></i>
        </a>
    </div>
    
    <main>
        <div class="about-me">
            <h2>About Me</h2>
            <p>Hello, world! Welcome to my personal website. 
                If you wish a more detailed portfolio, this is my <a href="Kalergis Resume.pdf" target="_blank">CV</a>.</p>
        </div>
        <img src="IMG_1989.jpg" alt="Profile Picture" class="profile-pic">
    </main>
    
    <footer>
        <p>&copy; 2024 Alexandros Kalergis</p>
    </footer>
</body>
</html>
