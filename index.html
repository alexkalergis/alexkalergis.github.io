<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Ensures padding is included in the element's total width and height */
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Prevent horizontal scrolling */
            overflow-y: auto; /* Allow vertical scrolling only when necessary */
        }

        header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; /* Keep the header fixed at the top */
            top: 0;
            background-color: white;
            z-index: 1000;
        }

        header a {
            margin-left: 2rem;
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 2px solid transparent;
        }

        header a.active {
            border-bottom-color: #3498db;
        }

        header a:hover {
            color: #3498db;
        }

        .social-links {
            display: flex;
            justify-content: flex-end;
            position: absolute;
            top: 1rem;
            right: 2rem;
        }

        .social-links a {
            margin-left: 1rem;
            color: #333;
            font-size: 1.5rem;
        }

        .social-links a:hover {
            color: #3498db;
        }

        main {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin-top: 5rem; /* Space for the fixed header */
            text-align: justify;
        }

        .about-me {
            max-width: 400px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-left: 2rem;
        }

        footer {
            text-align: center;
            padding: 0.3rem 0;
            width: 100%;
            background-color: #fff;
            font-size: 0.8rem;
            position: relative;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <a href="project.html" id="projects-link">Projects</a>
        <a href="designs.html" id="designs-link">Designs</a>
        <a href="other.html" id="other-link">Other</a>
    </header>
    
    <div class="social-links">
        <a href="https://www.linkedin.com/in/alexandros-kalergis/" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/alexkalergis" target="_blank" aria-label="GitHub">
            <i class="fab fa-github"></i>
        </a>
    </div>
    
    <main>
        <div class="about-me">
            <h2>About Me</h2>
            <p>Hello, world! Welcome to my personal website. 
                If you wish a more detailed portfolio, this is my <a href="Kalergis Resume.pdf" target="_blank">CV</a>.</p>
        </div>
        <img src="IMG_1989.jpg" alt="Profile Picture" class="profile-pic">
    </main>
    
    <footer>
        <p>&copy; 2024 Alexandros Kalergis</p>
    </footer>

    <script>
        const currentPage = window.location.pathname;
        if (currentPage.includes("projects")) {
            document.getElementById("projects-link").classList.add("active");
        } else if (currentPage.includes("designs")) {
            document.getElementById("designs-link").classList.add("active");
        } else if (currentPage.includes("other")) {
            document.getElementById("other-link").classList.add("active");
        }
    </script>
</body>
</html>
