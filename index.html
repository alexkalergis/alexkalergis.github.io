<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: center; /* Centering the navigation links */
            align-items: center;
            position: fixed;
            top: 0;
            background-color: white;
            z-index: 1000;
        }

        .nav-links a {
            margin-left: 2rem;
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 2px solid transparent;
        }

        .nav-links a.active {
            border-bottom-color: #3498db;
        }

        .nav-links a:hover {
            color: #3498db;
        }

        .social-links {
            position: absolute;
            right: 2rem;
            top: 1rem;
        }

        .social-links a {
            margin-left: 1rem;
            color: #333;
            font-size: 1.5rem;
        }

        .social-links a:hover {
            color: #3498db;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 5rem 2rem;
            margin-top: 6rem; /* Space for the fixed header */
        }

        .about-me {
            max-width: 400px; /* Restricted the width for better readability */
            margin-right: 4rem; /* Space between the text and profile picture */
            font-size: 1rem;
            line-height: 1.6;
            text-align: justify;
        }

        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
        }

        footer {
            text-align: center;
            padding: 0.3rem 0;
            width: 100%;
            background-color: #fff;
            font-size: 0.8rem;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-links">
            <a href="projects.html" id="projects-link">Projects</a>
            <a href="designs.html" id="designs-link">Designs</a>
            <a href="other.html" id="other-link">Other</a>
        </div>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/alexandros-kalergis/" target="_blank" aria-label="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://github.com/alexkalergis" target="_blank" aria-label="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>
    </header>

    <main>
        <div class="about-me">
            <h2>About Me</h2>
            <p>Hello, world! Welcome to my personal website. 
                If you wish for a more detailed portfolio, this is my <a href="Kalergis Resume.pdf" target="_blank">CV</a>.
            Keep in mind that my website is under contruction. Hold on!</p>
        </div>
        <img src="IMG_1989.jpg" alt="Profile Picture" class="profile-pic">
    </main>

    <footer>
        <p>&copy; 2024 Alexandros Kalergis</p>
    </footer>

    <script>
        const currentPage = window.location.pathname;
        if (currentPage.includes("projects")) {
            document.getElementById("projects-link").classList.add("active");
        } else if (currentPage.includes("designs")) {
            document.getElementById("designs-link").classList.add("active");
        } else if (currentPage.includes("other")) {
            document.getElementById("other-link").classList.add("active");
        }
    </script>
</body>
</html>
