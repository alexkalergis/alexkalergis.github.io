<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background-color: #f4f4f4;
        }
        header a {
            margin-left: 1rem;
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
        }
        header a:hover {
            color: #3498db;
        }
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        .project {
            border: 1px solid #ddd;
            padding: 1rem;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .project h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
        }
        .project p {
            margin: 0.5rem 0 0 0;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        footer {
            text-align: center;
            padding: 0.3rem 0;
            width: 100%;
            background-color: #f4f4f4;
            font-size: 0.8rem;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            header a {
                margin: 0.5rem 0;
            }
        }
        @media (min-width: 769px) {
            main {
                padding: 3rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <a href="https://www.linkedin.com/in/alexandros-kalergis/" target="_blank">LinkedIn</a>
        <a href="https://github.com/alexkalergis" target="_blank">GitHub</a>
    </header>
    <main>
        <h1>My Projects</h1>
        <div class="project">
            <h3>Project 1</h3>
            <p>Description of Project 1</p>
        </div>
        <div class="project">
            <h3>Project 2</h3>
            <p>Description of Project 2</p>
        </div>
        <!-- Add more projects here -->
    </main>
    <footer>
        <p>&copy; 2024 Alexandros Kalergis</p>
    </footer>
</body>
</html>
