<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background-color: #fff;
            position: absolute;
            top: 0;
            right: 0;
        }
        header a {
            margin-left: 1rem;
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
        }

        header a i {
            font-size: 2rem; 
        }
        header a:hover {
            color: #3498db;
        }
        main {
            display: flex;
            justify-content: flex-start; /* Aligns content to the left */
            align-items: flex-start; /* Aligns content to the top */
            padding: 4rem 2rem; /* Adds space around content */
        }
        ul.project-list {
            list-style-type: disc;
            padding-left: 2rem; /* Bullet indentation */
        }
        ul.project-list li {
            font-size: 1.2rem;
            line-height: 1.8;
        }
        footer {
            text-align: center;
            padding: 0.3rem 0;
            width: 100%;
            background-color: #fff;
            font-size: 0.8rem;
            position: absolute;
            bottom: 0;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            header a {
                margin: 0.5rem 0;
            }
            main {
                padding-left: 1rem;
            }
        }
        @media (min-width: 769px) {
            main {
                padding-left: 3rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="https://www.linkedin.com/in/alexandros-kalergis/" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/alexkalergis" target="_blank" aria-label="GitHub">
            <i class="fab fa-github"></i>
        </a>
        <a href="index.html">Home
        </a>
    </header>
    <main>
        <ul class="project-list" id="projectList">
            <!-- JavaScript will dynamically insert the projects here -->
        </ul>
    </main>
    <footer>
        <p>&copy; 2024 Alexandros Kalergis</p>
    </footer>

    <script>
        // Define an array of project objects
        const projects = [
            { title: 'Project 1', description: 'Description of Project 1' },
            { title: 'Project 2', description: 'Description of Project 2' },
            { title: 'Project 3', description: 'Description of Project 3' },
            // Add more projects as needed
        ];

        // Get the project list element
        const projectList = document.getElementById('projectList');

        // Loop through the projects array and insert each one as a list item
        projects.forEach(project => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${project.title}:</strong> ${project.description}`;
            projectList.appendChild(li);
        });
    </script>
</body>
</html>
