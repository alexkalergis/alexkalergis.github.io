<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background-color: #fff;
            position: absolute;
            top: 0;
            right: 0;
        }
        header a {
            margin-left: 1rem;
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
        }
        header a:hover {
            color: #3498db;
        }
        main {
            display: flex;
            flex: 1;
            justify-content: flex-start; 
            align-items: flex-start;
            padding-left: 2rem; 
        }
        ul.project-list {
            list-style-type: disc;
            padding-left: 2rem; /* Bullet indentation */
        }
        ul.project-list li {
            font-size: 1.2rem;
            line-height: 2.5;
        }
        footer {
            text-align: center;
            padding: 0.3rem 0;
            width: 100%;
            background-color: #fff;
            font-size: 0.8rem;
            position: absolute;
            bottom: 0;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            header a {
                margin: 0.5rem 0;
            }
            main {
                padding-left: 1rem;
            }
        }
        @media (min-width: 769px) {
            main {
                padding-left: 3rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <a href="https://www.linkedin.com/in/alexandros-kalergis/" target="_blank">LinkedIn</a>
        <a href="https://github.com/alexkalergis" target="_blank">GitHub</a>
    </header>
    <main>
        <ul class="project-list">
            <li><strong>Project 1:</strong> Description of Project 1</li>
            <li><strong>Project 2:</strong> Description of Project 2</li>
            <!-- Add more projects here -->
        </ul>
    </main>
    <footer>
        <p>&copy; 2024 Alexandros Kalergis</p>
    </footer>
</body>
</html>
